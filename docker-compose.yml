services:
  postgres:
    image: postgres:16-alpine
    container_name: orbio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orbio-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "60"
      - "1000"
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbio-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override host-only values from backend/.env so the container talks to
      # the services on the compose network rather than to localhost. Also
      # let the root .env steer LOG_LEVEL / ENVIRONMENT for ALL services
      # (api + workers) instead of having to update backend/.env separately.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379/0
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - chroma_data:/app/.chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sentiment-analysis-worker:
    build:
      context: ./backend
      dockerfile: workers/sentiment_analysis/Dockerfile
    container_name: orbio-sentiment-analysis-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}

  listwise-plackett-luce-worker:
    build:
      context: ./backend
      dockerfile: workers/listwise_plackett_luce/Dockerfile
    container_name: orbio-listwise-plackett-luce-worker
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}

  frontend:
    build:
      context: ./frontend-chat
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined at build time by Next.js, so they
        # must be passed as build args (not just runtime env). The browser
        # talks to the API via the host-published port, not the compose
        # network, so we use localhost:${API_PORT}.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-8000}}
    container_name: orbio-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pg_data:
  redis_data:
  chroma_data:
